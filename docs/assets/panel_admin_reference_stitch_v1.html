<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>

<title>Panel Administrativo - The Golden Green</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">

    body {
      font-family: 'Inter', sans-serif;
      background-color: #060906;
      color: #e5e7eb;
      background-image: radial-gradient(circle at top right, rgba(20, 30, 20, 0.4), transparent 50%),

    .font-serif {
      font-family: 'Playfair Display', serif;

    .bg-golden { background-color: #ffc107; }

    .bg-dark-surface { background-color: #0a0e0a; }
    .text-brand-green { color: #7ab52d; }
    .bg-brand-green { background-color: #7ab52d; }
    .border-brand-green { border-color: #7ab52d; }
  </style>

    body { padding-bottom: 80px; }
  </style>
